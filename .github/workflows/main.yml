name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install state
        run: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: Install frontend dependencies
        run: npm install --include=optional

      - name: Verify Rollup native package
        run: npm ls rollup

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        env:
          CI: true
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error

  contracts:
    name: Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run contract tests
        run: cargo test --workspace

      - name: Build escrow contract
        run: cargo build -p stellar-fund-contract --target wasm32-unknown-unknown --release

      - name: Build STF token contract
        run: cargo build -p stellar-fund-stf-token --target wasm32-unknown-unknown --release

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: target/wasm32-unknown-unknown/release/*.wasm
          if-no-files-found: error

  deploy:
    name: Deploy
    needs: [frontend, contracts]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Vercel configuration
        id: vercel-config
        shell: bash
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.vercel-config.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: steps.vercel-config.outputs.configured == 'true'
        run: npm install --global vercel

      - name: Pull Vercel environment
        if: steps.vercel-config.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build deploy output
        if: steps.vercel-config.outputs.configured == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        if: steps.vercel-config.outputs.configured == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Skip deploy when secrets are missing
        if: steps.vercel-config.outputs.configured != 'true'
        run: echo "Skipping Vercel deploy because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured."
