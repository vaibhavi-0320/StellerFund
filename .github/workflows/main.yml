name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # We removed 'cache: npm' to prevent the lockfile error 
          # until you have a package-lock.json committed.

      - name: Install dependencies
        # If your frontend is in a folder like 'client', change this to 'cd client && npm install'
        run: npm install 

      - name: Build frontend
        run: npm run build

  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run contract tests
        # We use the --manifest-path to avoid "directory not found" errors
        run: cargo test --manifest-path contracts/stellar_fund/Cargo.toml

      - name: Build contract to WASM
        run: cargo build --manifest-path contracts/stellar_fund/Cargo.toml --target wasm32-unknown-unknown --release

  deploy:
    needs: [frontend, contract]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Step
        run: echo "CI passed! Deploying..."
