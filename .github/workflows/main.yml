name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- CI Stage: Frontend ---
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  # --- CI Stage: Stellar Contract ---
  contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/stellar_fund
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      # Cache Rust dependencies to make builds 2-3x faster
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "contracts/stellar_fund -> target"

      - name: Run contract tests
        run: cargo test
      
      - name: Build contract to WASM
        run: cargo build --target wasm32-unknown-unknown --release

  # --- CD Stage: Deployment ---
  deploy:
    needs: [frontend, contract] # Only runs if both CI jobs pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to Production
        run: echo "Triggering deployment scripts..."
      # Add your specific deployment actions here (e.g., Stellar CLI or Vercel)
